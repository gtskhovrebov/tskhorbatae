<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="TSKHORBATÆ">
<meta name="theme-color" content="#090504">
<title>TSKHORBATÆ 4.0</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
  --bg:#080504;
  --panel:rgba(18,13,10,.72);
  --panel2:rgba(255,255,255,.065);
  --card:rgba(255,255,255,.075);
  --stroke:rgba(255,255,255,.13);
  --text:#fff7ed;
  --muted:#d6c3ae;
  --gold:#d49a38;
  --gold2:#f5d889;
  --green:#8ee0a1;
  --danger:#ff7474;
  --shadow:0 24px 70px rgba(0,0,0,.28);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",Roboto,Arial,sans-serif;
}
html[data-theme="light"]{
  --bg:#f4eadc;
  --panel:rgba(255,250,243,.76);
  --panel2:rgba(255,255,255,.66);
  --card:#fffdf8;
  --stroke:#ddcdb9;
  --text:#23170e;
  --muted:#725f4d;
  --shadow:0 22px 60px rgba(80,48,18,.12);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
body{
  overflow:hidden;
  background:
    radial-gradient(circle at var(--mx,22%) var(--my,12%),rgba(212,154,56,.16),transparent 28%),
    radial-gradient(circle at 88% 8%,rgba(117,31,15,.34),transparent 35%),
    linear-gradient(135deg,#070403,#130704 58%,#050302);
}
html[data-theme="light"] body{
  background:
    radial-gradient(circle at var(--mx,22%) var(--my,12%),rgba(212,154,56,.16),transparent 28%),
    radial-gradient(circle at 88% 2%,rgba(112,72,25,.10),transparent 35%),
    linear-gradient(135deg,#f4eadc,#fff8ee 54%,#efe0cc);
}
body:before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.48;
  background:
    linear-gradient(115deg,transparent 0 48%,rgba(212,154,56,.07) 49%,transparent 52%),
    repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 1px,transparent 1px 46px);
  animation:bg 16s ease-in-out infinite alternate;
}
@keyframes bg{to{transform:translateY(-14px) scale(1.012)}}
.app{height:100vh;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
aside{height:100vh;overflow-y:auto;overflow-x:hidden;padding:28px 22px 130px;border-right:1px solid var(--stroke);background:rgba(8,5,4,.58);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
html[data-theme="light"] aside{background:rgba(244,234,220,.72)}
aside::-webkit-scrollbar,main::-webkit-scrollbar{width:8px}
aside::-webkit-scrollbar-thumb,main::-webkit-scrollbar-thumb{background:rgba(212,154,56,.34);border-radius:999px}
.brand{padding:22px;border:1px solid var(--stroke);border-radius:30px;background:linear-gradient(145deg,var(--card),rgba(255,255,255,.025));box-shadow:var(--shadow);margin-bottom:18px}
.logo{font-family:Georgia,serif;font-size:74px;line-height:.8;color:var(--gold2);letter-spacing:-.08em}
.brand h1{margin:16px 0 10px;font-size:26px;letter-spacing:-.04em}
.os{color:var(--gold2);font-weight:900;line-height:1.35;margin:0 0 18px}
.quote{border-top:1px solid var(--stroke);border-bottom:1px solid var(--stroke);padding:14px 0;margin:14px 0;color:var(--gold2);font-family:Georgia,serif;font-style:italic;line-height:1.45}
.goal small{color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:850}
.goal b{display:block;margin-top:8px;font-size:18px;line-height:1.15}
.goal span{display:block;margin-top:8px;color:var(--gold2)}
.nav{display:grid;gap:8px}
.nav button{height:48px;border:1px solid transparent;border-radius:18px;background:transparent;color:var(--muted);font:800 15px var(--font);text-align:left;padding:0 14px;cursor:pointer}
.nav button.active{background:var(--panel2);border-color:var(--stroke);color:var(--text)}
.nav button:hover{background:var(--panel2);color:var(--text)}
main{height:100vh;overflow-y:auto;overflow-x:hidden;padding:30px 34px 90px}
.top{position:sticky;top:0;z-index:5;margin:-30px -34px 24px;padding:30px 34px 20px;background:linear-gradient(180deg,rgba(8,5,4,.86),rgba(8,5,4,.40));backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-bottom:1px solid var(--stroke)}
html[data-theme="light"] .top{background:linear-gradient(180deg,rgba(244,234,220,.94),rgba(244,234,220,.54))}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:18px}
.title h2{margin:0;font-size:42px;line-height:1;letter-spacing:-.06em}
.title p{margin:10px 0 0;color:var(--muted);font-size:17px}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.toggle{display:flex;padding:5px;border:1px solid var(--stroke);border-radius:999px;background:var(--panel2)}
.toggle button,.pill{height:40px;padding:0 16px;border:1px solid transparent;border-radius:999px;background:transparent;color:var(--text);font:850 14px var(--font);cursor:pointer}
.toggle button.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1d1208}
.pill{border-color:var(--stroke);background:var(--panel2)}
.pill.ok{border-color:rgba(142,224,161,.45);color:var(--green)}
.section{display:none;animation:in .25s ease-out}
.section.active{display:block}
@keyframes in{from{opacity:.65;transform:translateY(8px)}to{opacity:1;transform:none}}
.grid{display:grid;gap:14px}
.cols6{grid-template-columns:repeat(6,minmax(120px,1fr))}
.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}
.card,.metric{border:1px solid var(--stroke);border-radius:28px;background:linear-gradient(145deg,var(--card),rgba(255,255,255,.03));box-shadow:var(--shadow)}
html[data-theme="light"] .card,html[data-theme="light"] .metric{background:linear-gradient(180deg,#fffdf8,#fff6eb)}
.card{padding:24px}
.card h3{margin:0 0 12px;font-size:24px;letter-spacing:-.04em}
.card p{color:var(--muted);line-height:1.42}
.metric{min-height:116px;padding:18px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;position:relative}
.metric:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 18% 0%,rgba(212,154,56,.15),transparent 40%);pointer-events:none}
.metric small,.metric b,.track{position:relative;z-index:1}
.metric small{color:var(--muted);font-weight:850}
.metric b{font-size:36px;line-height:1;letter-spacing:-.06em}
.track{height:7px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
html[data-theme="light"] .track{background:#eadcc9}
.track i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:999px}
.dashboard{display:grid;gap:18px}
.progress{cursor:pointer;overflow:hidden}
.progress-head{display:grid;grid-template-columns:1fr auto;gap:22px;align-items:center}
.progress-head h3{font-size:28px}
.progress-head p{margin:0;color:var(--muted);max-width:760px}
.big{text-align:right}
.big b{display:block;font-size:60px;letter-spacing:-.075em;line-height:.95}
.big span{display:block;margin-top:8px;color:var(--muted);font-weight:850;font-size:12px}
.bars{display:grid;gap:15px;margin-top:24px}
.row-head{display:grid;grid-template-columns:1fr auto;gap:14px;margin-bottom:7px}
.row-head b{font-size:15px}
.row-head small{display:block;color:var(--muted);font-weight:750;margin-top:2px}
.row-head span{color:var(--muted);font-weight:850;white-space:nowrap}
.line{height:12px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;border:1px solid rgba(255,255,255,.08)}
html[data-theme="light"] .line{background:#eadcc9;border-color:#dfd0bd}
.line i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.details{display:none;margin-top:22px;padding-top:18px;border-top:1px solid var(--stroke)}
.progress.expanded .details{display:grid;gap:14px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.detail{padding:16px;min-height:122px;border:1px solid var(--stroke);border-radius:22px;background:rgba(255,255,255,.035)}
html[data-theme="light"] .detail{background:#fff8ef}
.detail b{font-size:32px;letter-spacing:-.06em}
.detail span{display:block;margin-top:8px;color:var(--muted);font-size:12px;font-weight:800;line-height:1.35}
.quick{display:flex;gap:10px;flex-wrap:wrap}
button.primary,.quick button,.btn{min-height:44px;border:1px solid var(--stroke);border-radius:16px;background:var(--panel2);color:var(--text);font:850 14px var(--font);padding:0 18px;cursor:pointer}
button.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1d1208;border-color:rgba(255,255,255,.18)}
input,textarea,select{width:100%;min-height:46px;border:1px solid var(--stroke);border-radius:16px;background:var(--panel2);color:var(--text);padding:12px 14px;font:600 15px var(--font)}
textarea{min-height:110px;resize:vertical}
.list{display:grid;gap:12px}
.item{padding:16px;border:1px solid var(--stroke);border-radius:22px;background:var(--panel2)}
.item h4{margin:0 0 6px;font-size:18px}
.item p{margin:0;color:var(--muted)}
.form{display:grid;gap:10px}
.mobile-nav{display:none}
@media(max-width:1180px){.cols6{grid-template-columns:repeat(3,1fr)}.cols2{grid-template-columns:1fr}.progress-head{grid-template-columns:1fr}.big{text-align:left}}
@media(max-width:980px){
 body{overflow:auto}.app{display:block;height:auto;overflow:visible}aside{display:none}main{height:auto;overflow:visible;padding:22px 18px 110px}.top{margin:-22px -18px 18px;padding:calc(env(safe-area-inset-top) + 18px) 18px 16px}.topbar{display:grid}.title h2{font-size:36px}.cols6{grid-template-columns:1fr}.metric b{font-size:46px}.mobile-nav{position:fixed;left:14px;right:14px;bottom:calc(env(safe-area-inset-bottom) + 12px);display:flex;justify-content:space-around;gap:4px;padding:9px;border:1px solid var(--stroke);border-radius:28px;background:rgba(20,14,10,.80);backdrop-filter:blur(34px);z-index:20}.mobile-nav button{border:0;background:transparent;color:var(--muted);font:800 12px var(--font);padding:8px;border-radius:18px}.mobile-nav button.active{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1d1208}
}

/* ---------- 4.1 Visual Progress + premium checks ---------- */
.check-tile{
  width:52px;
  height:52px;
  border-radius:16px;
  display:grid;
  place-items:center;
  flex:0 0 auto;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;
}
.check-tile::before{
  content:"";
  width:22px;
  height:22px;
  border-radius:8px;
  border:2px solid rgba(255,255,255,.42);
  background:rgba(255,255,255,.05);
}
html[data-theme="light"] .check-tile::before{
  border-color:#bfae98;
  background:#fffaf3;
}
.check-tile.done{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-color:rgba(255,255,255,.22);
  box-shadow:0 10px 28px rgba(212,154,56,.24), inset 0 1px 0 rgba(255,255,255,.25);
}
.check-tile.done::before{
  content:"✓";
  width:auto;
  height:auto;
  border:0;
  background:transparent;
  color:#1d1208;
  font-size:34px;
  line-height:1;
  font-weight:950;
  transform:translateY(-1px);
}
.item.task-item{
  display:flex;
  align-items:center;
  gap:16px;
  cursor:pointer;
}
.item.task-item h4{margin:0 0 4px}
.item.task-item p{margin:0}
.visual-progress{
  margin-top:20px;
  padding:18px;
  border-radius:26px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.035);
}
html[data-theme="light"] .visual-progress{background:#fff8ef}
.visual-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:14px;
  margin-bottom:14px;
}
.visual-head b{font-size:15px;color:var(--text)}
.visual-head span{font-size:12px;color:var(--muted);font-weight:850}
.visual-scale{
  height:30px;
  border-radius:999px;
  background:
    linear-gradient(90deg,rgba(255,255,255,.08),rgba(255,255,255,.025)),
    repeating-linear-gradient(90deg,transparent 0 9.5%,rgba(255,255,255,.12) 9.5% 10%);
  border:1px solid var(--stroke);
  overflow:hidden;
  position:relative;
}
html[data-theme="light"] .visual-scale{
  background:
    linear-gradient(90deg,#eadcc9,#fff8ef),
    repeating-linear-gradient(90deg,transparent 0 9.5%,rgba(80,56,28,.16) 9.5% 10%);
}
.visual-scale i{
  display:block;
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#9b641f,var(--gold),var(--gold2));
  box-shadow:0 0 28px rgba(212,154,56,.28);
  transition:width .45s cubic-bezier(.2,.8,.2,1);
}
.visual-labels{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  color:var(--muted);
  font-size:11px;
  font-weight:850;
}
.progress{position:relative}
.progress::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:radial-gradient(circle at 88% 8%,rgba(212,154,56,.14),transparent 34%);
  pointer-events:none;
}
.progress > *{position:relative;z-index:1}
.line{height:14px!important}
.metric .track{height:8px!important}

</style>
</head>
<body>
<div class="app">
<aside>
  <div class="brand">
    <div class="logo">Æ</div>
    <h1>TSKHORBATÆ</h1>
    <p class="os">Æвзаг.<br>Адæм.<br>Паддзахад.</p>
    <div class="quote">«От знания языка — к пониманию народа.<br>От понимания народа — к пониманию государства.»</div>
    <div class="goal"><small>Цель</small><b>Молодой аналитик<br>по Южной Осетии</b><span>Январь 2027</span></div>
  </div>
  <nav class="nav" id="nav"></nav>
</aside>
<main>
  <div class="top">
    <div class="topbar">
      <div class="title"><h2 id="pageTitle">Главная панель</h2><p id="pageSub">Ежедневный режим, прогресс и сигналы.</p></div>
      <div class="actions"><div class="toggle"><button id="darkBtn" onclick="setTheme('dark')">Тёмная</button><button id="lightBtn" onclick="setTheme('light')">Светлая</button></div><button class="pill" id="syncState" onclick="setPage('settings')">Локально</button></div>
    </div>
  </div>
  <section class="section active" id="dashboard"></section>
  <section class="section" id="plan"></section>
  <section class="section" id="language"></section>
  <section class="section" id="news"></section>
  <section class="section" id="actors"></section>
  <section class="section" id="settings"></section>
</main>
<div class="mobile-nav" id="mobileNav"></div>
</div>
<script>
const KEY="tskhorbatae_4_reset";
const pages=[
 ["dashboard","🏠","Главная панель","Ежедневный режим, прогресс и сигналы."],
 ["plan","✅","План дня","Ежедневные задачи, галочки и дисциплина."],
 ["language","📚","Осетинский язык","Словарь и языковая база."],
 ["news","📰","Информационное поле","Источники, новости и повестка."],
 ["actors","👥","Акторы","Люди, институты и карта влияния."],
 ["settings","⚙️","Настройки","Синхронизация и данные."]
];
let db=load();
function load(){
 const raw=localStorage.getItem(KEY);
 if(raw){try{return JSON.parse(raw)}catch(e){}}
 return {
  tasks:[
   {id:uid(),title:"Осетинский язык: 10 слов",done:false,area:"Язык"},
   {id:uid(),title:"Обработать 3 новости",done:false,area:"Мониторинг"},
   {id:uid(),title:"Добавить/обновить 1 актора",done:false,area:"Аналитика"},
   {id:uid(),title:"Сделать короткий вывод дня",done:false,area:"Самопроверка"}
  ],
  words:[{id:uid(),word:"фарн",translation:"благодать, сила, удача"}],
  sources:[{id:uid(),name:"ИА Рес",type:"Официальное СМИ",trust:"Высокий"},{id:uid(),name:"Sputnik Южная Осетия",type:"СМИ",trust:"Средний"}],
  news:[],
  actors:[{id:uid(),name:"Алан Гаглоев",role:"Президент РЮО",influence:100,contour:"РЮО"}],
  products:[],
  settings:{theme:"dark",sync:false}
 };
}
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function pct(v,t){return t?Math.max(0,Math.min(100,Math.round((Number(v)||0)/(Number(t)||1)*100))):0}
function setTheme(t){document.documentElement.dataset.theme=t;db.settings.theme=t;save();darkBtn.classList.toggle("active",t==="dark");lightBtn.classList.toggle("active",t==="light")}
function setPage(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 const p=pages.find(x=>x[0]===id); pageTitle.textContent=p[2]; pageSub.textContent=p[3];
 document.querySelectorAll("[data-page]").forEach(b=>b.classList.toggle("active",b.dataset.page===id));
 render(id);
}
function initNav(){
 nav.innerHTML=pages.map(p=>`<button data-page="${p[0]}" onclick="setPage('${p[0]}')">${p[1]} ${p[2]}</button>`).join("");
 mobileNav.innerHTML=pages.slice(0,5).map(p=>`<button data-page="${p[0]}" onclick="setPage('${p[0]}')">${p[1]}<br>${p[2].split(" ")[0]}</button>`).join("");
}
function metric(label,val,target){
 const p=target?pct(val,target):0, display=target?`${val}/${target}`:val;
 return `<div class="metric"><small>${label}</small><b>${display}</b><div class="track"><i style="width:${p}%"></i></div></div>`;
}
function renderDashboard(){
 const done=db.tasks.filter(t=>t.done).length;
 const goals=[
  ["Слова",db.words.length,1000,"Осетинский словарь и языковая база"],
  ["Источники",db.sources.length,100,"СМИ, официальные сайты, каналы, эксперты"],
  ["Новости",db.news.length,500,"События, факты и повестка"],
  ["Акторы",db.actors.length,150,"Люди, институты и внешние игроки"],
  ["Продукты",db.products.length,30,"Дайджесты, записки и публикации"]
 ];
 const avg=Math.round(goals.reduce((s,g)=>s+pct(g[1],g[2]),0)/goals.length);
 const bars=goals.map(g=>`<div><div class="row-head"><div><b>${g[0]}</b><small>${g[3]}</small></div><span>${g[1]}/${g[2]} · ${pct(g[1],g[2])}%</span></div><div class="line"><i style="width:${pct(g[1],g[2])}%"></i></div></div>`).join("");
 const visual=`<div class="visual-progress"><div class="visual-head"><b>Шкала готовности системы</b><span>${avg}% из 100%</span></div><div class="visual-scale"><i style="width:${avg}%"></i></div><div class="visual-labels"><span>старт</span><span>рабочая база</span><span>сильная система</span></div></div>`;
 const details=goals.map(g=>`<div class="detail"><b>${pct(g[1],g[2])}%</b><span>${g[0]}: ${g[1]}/${g[2]}<br>${g[3]}</span></div>`).join("");
 dashboard.innerHTML=`<div class="dashboard">
  <div class="grid cols6">${metric("Задачи",done,db.tasks.length||1)}${metric("Слова",db.words.length,10)}${metric("Новости",db.news.length,3)}${metric("Источники",db.sources.length,100)}${metric("Акторы",db.actors.length,150)}${metric("Продукты",db.products.length,30)}</div>
  <div class="grid cols2">
   <div class="card"><h3>Режим 60 минут</h3><p>📚 15 мин — язык</p><p>📰 20 мин — новости</p><p>🧠 20 мин — акторы/аналитика</p><p>◇ 5 мин — самопроверка</p></div>
   <div class="card"><h3>Сигналы</h3><p>Слова: ${db.words.length}/10</p><p>Новости: ${db.news.length}/3</p><p>Акторы: ${db.actors.length}/150</p><button class="primary" onclick="db.tasks.forEach(t=>t.done=true);save();renderDashboard()">Закрыть день</button></div>
  </div>
  <div class="card progress" onclick="this.classList.toggle('expanded')"><div class="progress-head"><div><h3>Прогресс системы</h3><p>Насколько заполнена твоя аналитическая база по Южной Осетии. Нажми, чтобы раскрыть подробности.</p></div><div class="big"><b>${avg}%</b><span>общий прогресс</span></div></div><div class="bars">${bars}</div>${visual}<div class="details"><div class="detail-grid">${details}</div></div></div>
  <div class="card"><h3>Быстрые действия</h3><div class="quick"><button onclick="setPage('plan')">План дня</button><button onclick="setPage('language')">+ слово</button><button onclick="setPage('news')">+ новость</button><button onclick="setPage('actors')">+ актор</button><button class="primary" onclick="setPage('news')">Дайджест</button></div></div>
 </div>`;
}
function renderPlan(){
 plan.innerHTML=`<div class="card"><h3>План дня</h3><div class="list">${db.tasks.map(t=>`<div class="item task-item" onclick="const x=db.tasks.find(y=>y.id==='${t.id}');x.done=!x.done;save();renderPlan()"><div class="check-tile ${t.done?'done':''}"></div><div><h4>${esc(t.title)}</h4><p>${esc(t.area)}</p></div></div>`).join("")}</div><br><div class="form"><input id="taskTitle" placeholder="Новая задача"><button class="primary" onclick="addTask()">+ задача</button></div></div>`;
}
function addTask(){if(!taskTitle.value.trim())return;db.tasks.push({id:uid(),title:taskTitle.value.trim(),done:false,area:"Работа"});save();renderPlan()}
function renderLanguage(){
 language.innerHTML=`<div class="grid cols2"><div class="card"><h3>Добавить слово</h3><div class="form"><input id="w" placeholder="Слово"><input id="tr" placeholder="Перевод"><button class="primary" onclick="addWord()">Сохранить</button></div></div><div class="card"><h3>Словарь</h3><div class="list">${db.words.map(x=>`<div class="item"><h4>${esc(x.word)}</h4><p>${esc(x.translation)}</p></div>`).join("")}</div></div></div>`;
}
function addWord(){if(!w.value.trim())return;db.words.push({id:uid(),word:w.value.trim(),translation:tr.value.trim()});save();renderLanguage()}
function renderNews(){
 news.innerHTML=`<div class="grid cols2"><div class="card"><h3>Добавить новость</h3><div class="form"><input id="nt" placeholder="Заголовок"><textarea id="nb" placeholder="Факт → причина → последствие → вывод"></textarea><button class="primary" onclick="addNews()">Сохранить</button></div></div><div class="card"><h3>Новости</h3><div class="list">${db.news.map(x=>`<div class="item"><h4>${esc(x.title)}</h4><p>${esc(x.body)}</p></div>`).join("")||"<p>Нет новостей.</p>"}</div></div></div>`;
}
function addNews(){if(!nt.value.trim())return;db.news.push({id:uid(),title:nt.value.trim(),body:nb.value.trim()});save();renderNews()}
function renderActors(){
 actors.innerHTML=`<div class="grid cols2"><div class="card"><h3>Добавить актора</h3><div class="form"><input id="an" placeholder="Имя/институт"><input id="ar" placeholder="Роль"><input id="ai" type="number" min="0" max="100" placeholder="Влияние 0-100"><button class="primary" onclick="addActor()">Сохранить</button></div></div><div class="card"><h3>Акторы</h3><div class="list">${db.actors.map(x=>`<div class="item"><h4>${esc(x.name)} · ${x.influence||0}/100</h4><p>${esc(x.role)}</p></div>`).join("")}</div></div></div>`;
}
function addActor(){if(!an.value.trim())return;db.actors.push({id:uid(),name:an.value.trim(),role:ar.value.trim(),influence:Number(ai.value||0),contour:"РЮО"});save();renderActors()}
function renderSettings(){
 settings.innerHTML=`<div class="card"><h3>Настройки</h3><p>Сейчас данные сохраняются локально в браузере. Эта версия собрана как стабильная рабочая основа без поломанных графиков.</p><button class="primary" onclick="exportData()">Экспорт JSON</button></div>`;
}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}));a.download="tskhorbatae-data.json";a.click()}
function render(id){({dashboard:renderDashboard,plan:renderPlan,language:renderLanguage,news:renderNews,actors:renderActors,settings:renderSettings}[id]||renderDashboard)()}
document.addEventListener("pointermove",e=>{document.body.style.setProperty("--mx",Math.round(e.clientX/window.innerWidth*100)+"%");document.body.style.setProperty("--my",Math.round(e.clientY/window.innerHeight*100)+"%")},{passive:true});
initNav();setTheme(db.settings.theme||"dark");setPage("dashboard");
</script>
</body>
</html>
