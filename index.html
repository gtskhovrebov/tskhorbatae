function save(){localStorage.setItem(KEY,JSON.stringify(db));updateSyncState()}
function pct(v,t){return t?Math.max(0,Math.min(100,Math.round((Number(v)||0)/(Number(t)||1)*100))):0}
function setTheme(t){document.documentElement.dataset.theme=t;db.settings.theme=t;save();$("darkBtn").classList.toggle("active",t==="dark");$("lightBtn").classList.toggle("active",t==="light")}
function setPage(id){try{document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");const p=pages.find(x=>x[0]===id)||pages[0];$("pageTitle").textContent=p[2];$("pageSub").textContent=p[3];document.querySelectorAll("[data-page]").forEach(b=>b.classList.toggle("active",b.dataset.page===id));render(id)}catch(e){console.error(e);setHTML(id,`<div class="card"><h3>Ошибка рендера</h3><p>${esc(e.message||e)}</p></div>`)}}
function initNav(){setHTML("nav",pages.map(p=>`<button data-page="${p[0]}" onclick="setPage('${p[0]}')">${p[1]} ${p[2]}</button>`).join(""));setHTML("mobileNav",pages.slice(0,5).map(p=>`<button data-page="${p[0]}" onclick="setPage('${p[0]}')">${p[1]}<br>${p[2].split(" ")[0]}</button>`).join(""))}
function metric(label,v,t){const p=t?pct(v,t):0;return `<div class="metric"><small>${label}</small><b>${t?`${v}/${t}`:v}</b><div class="track"><i style="width:${p}%"></i></div></div>`}
function renderDashboard(){const done=db.tasks.filter(t=>t.done).length;const goals=[["Слова",db.words.length,1000,"Осетинский словарь и языковая база"],["Источники",db.sources.length,100,"СМИ, официальные сайты, каналы, эксперты"],["Новости",db.news.length,500,"События, факты и повестка"],["Акторы",db.actors.length,150,"Люди, институты и внешние игроки"],["Продукты",db.products.length,30,"Дайджесты, записки и публикации"]];const avg=Math.round(goals.reduce((s,g)=>s+pct(g[1],g[2]),0)/goals.length);const bars=goals.map(g=>`<div><div class="row-head"><div><b>${g[0]}</b><small>${g[3]}</small></div><span>${g[1]}/${g[2]} · ${pct(g[1],g[2])}%</span></div><div class="line"><i style="width:${pct(g[1],g[2])}%"></i></div></div>`).join("");const details=goals.map(g=>`<div class="detail"><b>${pct(g[1],g[2])}%</b><span>${g[0]}: ${g[1]}/${g[2]}<br>${g[3]}</span></div>`).join("");setHTML("dashboard",`<div class="dashboard"><div class="grid cols6">${metric("Задачи",done,db.tasks.length||1)}${metric("Слова",db.words.length,10)}${metric("Новости",db.news.length,3)}${metric("Источники",db.sources.length,100)}${metric("Акторы",db.actors.length,150)}${metric("Продукты",db.products.length,30)}</div><div class="grid cols2"><div class="card"><h3>Режим 60 минут</h3><p>📚 15 мин — язык</p><p>📰 20 мин — новости</p><p>🧠 20 мин — акторы/аналитика</p><p>◇ 5 мин — самопроверка</p></div><div class="card"><h3>Сигналы</h3><p>Слова: ${db.words.length}/10</p><p>Новости: ${db.news.length}/3</p><p>Акторы: ${db.actors.length}/150</p><button class="primary" onclick="db.tasks.forEach(t=>t.done=true);save();renderDashboard()">Закрыть день</button></div></div><div class="card progress" onclick="this.classList.toggle('expanded')"><div class="progress-head"><div><h3>Прогресс системы</h3><p>Насколько заполнена твоя аналитическая база по Южной Осетии. Нажми, чтобы раскрыть подробности.</p></div><div class="big"><b>${avg}%</b><span>общий прогресс</span></div></div><div class="bars">${bars}</div><div class="visual-progress"><div class="visual-head"><b>Шкала готовности системы</b><span>${avg}% из 100%</span></div><div class="visual-scale"><i style="width:${avg}%"></i></div><div class="visual-labels"><span>старт</span><span>рабочая база</span><span>сильная система</span></div></div><div class="details"><div class="detail-grid">${details}</div></div></div><div class="card"><h3>Быстрые действия</h3><div class="quick"><button onclick="setPage('plan')">План дня</button><button onclick="setPage('language')">+ слово</button><button onclick="setPage('field')">+ новость</button><button onclick="setPage('actors')">+ актор</button><button class="primary" onclick="setPage('media')">Дайджест</button></div></div></div>`)}
function renderPlan(){setHTML("plan",`<div class="grid cols2"><div class="card"><h3>План дня</h3><div class="list">${db.tasks.map(t=>`<div class="item task-item" onclick="const x=db.tasks.find(y=>y.id==='${t.id}');x.done=!x.done;save();renderPlan()"><div class="check-tile ${t.done?'done':''}"></div><div><h4>${esc(t.title)}</h4><p>${esc(t.area)} · ${esc(t.date||todayISO())}</p></div></div>`).join("")}</div></div><div class="card"><h3>Добавить задачу</h3><div class="form"><input id="taskTitle" placeholder="Новая задача"><input id="taskArea" placeholder="Сфера"><button class="primary" onclick="addTask()">+ задача</button></div></div></div>`)}
function addTask(){if(!val("taskTitle").trim())return;db.tasks.push({id:uid(),title:val("taskTitle").trim(),done:false,area:val("taskArea").trim()||"Работа",date:todayISO()});save();renderPlan()}
function renderCalendar(){const grouped={};db.tasks.forEach(t=>{const d=t.date||todayISO();(grouped[d]||(grouped[d]=[])).push(t)});setHTML("calendar",`<div class="card"><h3>Календарь задач</h3><div class="list">${Object.keys(grouped).sort().map(d=>`<div class="item"><h4>${d}</h4><p>${grouped[d].map(t=>(t.done?"✅ ":"▫️ ")+esc(t.title)).join("<br>")}</p></div>`).join("")||"<p>Нет задач.</p>"}</div></div>`)}
function norm(s){return String(s||"").toLowerCase().replaceAll("ӕ","æ").replaceAll("ае","æ").replaceAll("ae","æ")}
const osLetters=["Все","А","Æ/Ӕ","Б","В","Г","Д","Е","З","И","К","Л","М","Н","О","П","Р","С","Т","У","Ф","Х","Ц","Ч"];
function insertChar(ch){const el=document.activeElement;if(!el||!["INPUT","TEXTAREA"].includes(el.tagName))return;const a=el.selectionStart,b=el.selectionEnd;el.value=el.value.slice(0,a)+ch+el.value.slice(b);el.focus();el.selectionStart=el.selectionEnd=a+ch.length;el.dispatchEvent(new Event("input"))}
function renderLanguage(){
 const prev=val("wordSearch");
 const q=norm(prev);
 const tags=["Все",...Array.from(new Set(db.words.map(w=>w.tag).filter(Boolean)))];
 const filtered=db.words.filter(w=>{
   const letterOk=langLetter==="Все"||(langLetter==="Æ/Ӕ"?norm(w.word).startsWith("æ"):norm(w.word).startsWith(norm(langLetter)));
   const tagOk=langTag==="Все"||w.tag===langTag;
   const qOk=!q||norm(w.word).includes(q)||norm(w.translation).includes(q)||norm(w.tag).includes(q);
   return letterOk&&tagOk&&qOk;
 }).sort((a,b)=>norm(a.word).localeCompare(norm(b.word)));
 setHTML("language",`<div class="toolbar"><input id="wordSearch" placeholder="Поиск по слову или переводу: фарн / удача / æ" oninput="renderLanguage()" value="${esc(prev)}"></div>
 <div class="kbd"><button onclick="insertChar('ӕ')">ӕ</button><button onclick="insertChar('Æ')">Æ</button><button onclick="insertChar('æ')">æ</button></div>
 <div class="alpha">${osLetters.map(l=>`<button class="${l===langLetter?'active':''}" onclick="langLetter='${l}';renderLanguage()">${l}</button>`).join("")}</div>
 <div class="tag-row">${tags.map(t=>`<button class="${t===langTag?'active':''}" onclick="langTag=${JSON.stringify(t)};renderLanguage()">${esc(t)}</button>`).join("")}</div>
 <div class="grid cols2">
  <div class="card"><h3>Добавить слово</h3><p>Тег указываешь сам. Можно оставить пустым.</p><div class="form"><input id="w" placeholder="Слово"><input id="tr" placeholder="Перевод"><input id="tag" placeholder="Свой тег: политика / культура / управление"><button class="primary" onclick="addWord()">Сохранить</button></div></div>
  <div class="card"><h3>Словарь · ${filtered.length}</h3><div class="list">${filtered.map(x=>`<div class="item"><h4>${esc(x.word)}</h4><p>${esc(x.translation)}${x.tag?`<br><span class="badge">${esc(x.tag)}</span>`:""}</p></div>`).join("")||"<p>Ничего не найдено.</p>"}</div></div>
 </div>`);
 setTimeout(()=>{const el=$("wordSearch");if(el){el.focus();el.selectionStart=el.selectionEnd=el.value.length}},0)
}
function addWord(){if(!val("w").trim())return;db.words.push({id:uid(),word:val("w").trim(),translation:val("tr").trim(),tag:val("tag").trim()});save();renderLanguage()}
function renderField(){setHTML("field",`<div class="grid cols2"><div class="card"><h3>Источники</h3><div class="form"><input id="sn" placeholder="Название источника"><input id="st" placeholder="Тип"><input id="su" placeholder="Ссылка"><select id="trust"><option>Высокий</option><option>Средний</option><option>Низкий</option></select><button class="primary" onclick="addSource()">+ источник</button></div><br><div class="list">${db.sources.map(s=>`<div class="item"><h4>${esc(s.name)}</h4><p>${esc(s.type)} · доверие: ${esc(s.trust)}<br>${esc(s.url||"")}</p></div>`).join("")}</div></div><div class="card"><h3>Новости</h3><div class="form"><input id="nt" placeholder="Заголовок"><textarea id="nb" placeholder="Факт → причина → последствие → вывод"></textarea><button class="primary" onclick="addNews()">+ новость</button></div><br><div class="list">${db.news.map(n=>`<div class="item"><h4>${esc(n.title)}</h4><p>${esc(n.body)}</p></div>`).join("")||"<p>Нет новостей.</p>"}</div></div></div>`)}
function addSource(){if(!val("sn").trim())return;db.sources.push({id:uid(),name:val("sn").trim(),type:val("st").trim(),url:val("su").trim(),trust:val("trust")});save();renderField()}
function addNews(){if(!val("nt").trim())return;db.news.push({id:uid(),title:val("nt").trim(),body:val("nb").trim(),date:todayISO()});save();renderField()}
function renderActors(){setHTML("actors",`<div class="grid cols2"><div class="card"><h3>Добавить актора</h3><div class="form"><input id="an" placeholder="Имя/институт"><input id="ar" placeholder="Роль"><select id="ac"><option>РЮО</option><option>Россия</option><option>Грузия</option><option>Межд.</option><option>Диаспора</option></select><input id="ai" type="number" min="0" max="100" placeholder="Влияние 0-100"><button class="primary" onclick="addActor()">Сохранить</button></div></div><div class="card"><h3>Акторы</h3><div class="list">${db.actors.map(a=>`<div class="item"><h4>${esc(a.name)} · ${Number(a.influence||0)}/100</h4><p>${esc(a.role)}<br><span class="badge">${esc(a.contour)}</span></p></div>`).join("")}</div></div></div>`)}
function addActor(){if(!val("an").trim())return;db.actors.push({id:uid(),name:val("an").trim(),role:val("ar").trim(),influence:Number(val("ai")||0),contour:val("ac"),x:100+Math.random()*600,y:80+Math.random()*320});save();renderActors()}
function renderMap(){
 const levelOf=a=>Number(a.influence||0)>=75?"high":Number(a.influence||0)>=40?"mid":"low";
 const title={high:"Высокое влияние",mid:"Среднее влияние",low:"Низкое / периферийное влияние"};
 const hint={high:"ключевые центры решений и устойчивые игроки",mid:"важные, но зависимые участники",low:"наблюдаемые или ситуативные акторы"};
 const allActors=[...db.actors].sort((a,b)=>(b.influence||0)-(a.influence||0));
 const levelHTML=["high","mid","low"].map(l=>{
   const arr=allActors.filter(a=>levelOf(a)===l);
   return `<div class="level-block"><div class="level-head"><h3>${title[l]}</h3><span>${arr.length} · ${hint[l]}</span></div><div class="level-grid">${arr.map(a=>`<div class="actor-level-card ${l}"><h4>${esc(a.name)} · ${Number(a.influence||0)}/100</h4><p>${esc(a.role)}<br><span class="badge">${esc(a.contour)}</span></p><div class="track" style="margin-top:12px"><i style="width:${Number(a.influence||0)}%"></i></div></div>`).join("")||`<div class="item"><p>Пока нет акторов этого уровня.</p></div>`}</div></div>`;
 }).join("");
 const center={x:420,y:70};
 const top=allActors.slice(0,12);
 const nodes=top.map((a,i)=>{let x=a.x,y=a.y;if(!x||!y){const angle=(i/Math.max(1,top.length))*Math.PI*2;x=420+Math.cos(angle)*280;y=240+Math.sin(angle)*170}return{...a,x,y}});
 const lines=nodes.slice(1).map(n=>`<line x1="${center.x+75}" y1="${center.y+45}" x2="${n.x+75}" y2="${n.y+45}"/>`).join("");
 setHTML("map",`<div class="grid"><div class="card"><h3>Карта влияния по уровням</h3><p>Сначала уровни влияния, ниже — визуальная карта связей. Так карточки не ломаются и не вылезают.</p><div class="levels">${levelHTML}</div></div><div class="card"><h3>Визуальная карта</h3><div class="map-wrap"><div class="map-canvas"><svg class="links">${lines}</svg>${nodes.map(a=>`<div class="node" style="left:${a.x}px;top:${a.y}px"><h4>${esc(a.name)}</h4><p>${esc(a.role)}<br>${esc(a.contour)} · ${Number(a.influence||0)}/100</p><div class="inf"><i style="width:${Number(a.influence||0)}%"></i></div></div>`).join("")}</div></div></div></div>`)
}
function renderAnalysis(){setHTML("analysis",`<div class="grid cols2"><div class="card"><h3>Аналитическая заметка</h3><div class="form"><input id="noteTitle" placeholder="Тема"><textarea id="noteBody" placeholder="Гипотеза → аргументы → вывод"></textarea><button class="primary" onclick="addNote()">Сохранить</button></div></div><div class="card"><h3>Заметки</h3><div class="list">${db.notes.map(n=>`<div class="item"><h4>${esc(n.title)}</h4><p>${esc(n.body)}</p></div>`).join("")||"<p>Нет заметок.</p>"}</div></div></div>`)}
function addNote(){if(!val("noteTitle").trim())return;db.notes.push({id:uid(),title:val("noteTitle").trim(),body:val("noteBody").trim(),date:todayISO()});save();renderAnalysis()}
function generateDigest(){const latest=db.news.slice(-5).reverse();const actors=[...db.actors].sort((a,b)=>(b.influence||0)-(a.influence||0)).slice(0,3);const text=`📌 Главное за неделю в Южной Осетии\n\n${latest.length?latest.map(n=>"▪️ "+n.title+" — "+(n.body||"").slice(0,160)).join("\n\n"):"▪️ Пока новостей в базе нет. Добавь события в разделе «Информационное поле»."}\n\n👥 Ключевые акторы: ${actors.map(a=>a.name).join(", ")||"пока не заполнено"}.\n\n💬 Вывод:\nНеделя показывает, какие процессы требуют отдельного наблюдения: кадровые решения, работа институтов и практическая реализация договорённостей с Россией.`;setVal("postBody",text)}
function renderMedia(){setHTML("media",`<div class="grid cols2"><div class="card"><h3>Медиацентр</h3><div class="form"><input id="postTitle" placeholder="Название публикации"><textarea id="postBody" placeholder="Текст поста / дайджеста"></textarea><button class="btn" onclick="generateDigest()">Сгенерировать дайджест из базы</button><button class="primary" onclick="savePost()">Сохранить публикацию</button></div></div><div class="card"><h3>Публикации</h3><div class="list">${db.posts.map(p=>`<div class="item"><h4>${esc(p.title)}</h4><p>${esc(p.body)}</p></div>`).join("")||"<p>Нет публикаций.</p>"}</div></div></div>`)}
function savePost(){if(!val("postTitle").trim()&&!val("postBody").trim())return;db.posts.push({id:uid(),title:val("postTitle").trim()||"Без названия",body:val("postBody").trim(),date:todayISO()});db.products.push({id:uid(),title:val("postTitle").trim()||"Публикация",type:"Пост",date:todayISO()});save();renderMedia()}
function renderPortfolio(){setHTML("portfolio",`<div class="card"><h3>Портфолио</h3><div class="list">${db.products.map(p=>`<div class="item"><h4>${esc(p.title)}</h4><p>${esc(p.type)} · ${esc(p.date)}</p></div>`).join("")||"<p>Готовых материалов пока нет. Сохраняй публикации и аналитические продукты.</p>"}</div></div>`)}
function renderExport(){setHTML("dataExport",`<div class="grid cols2"><div class="card"><h3>Экспорт</h3><p>Скачай резервную копию базы.</p><button class="primary" onclick="exportData()">Скачать JSON</button></div><div class="card"><h3>Импорт</h3><input type="file" id="importFile" accept=".json"><button class="btn" onclick="importData()">Загрузить JSON</button></div></div>`)}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:"application/json"}));a.download="tskhorbatae-data.json";a.click()}
function importData(){const f=$("importFile")?.files?.[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{db=migrate(JSON.parse(r.result));save();alert("Импортировано");setPage("dashboard")}catch(e){alert("Ошибка JSON")}};r.readAsText(f)}
function renderSettings(){setHTML("settings",`<div class="grid cols2"><div class="card"><h3>Supabase</h3><p>Таблица: <b>items</b>. Тип записи: <b>workspace</b>.</p><div class="form"><input id="sbUrl" placeholder="https://...supabase.co" value="${esc(db.settings.supabaseUrl||"")}"><input id="sbKey" placeholder="anon key" value="${esc(db.settings.anonKey||"")}"><input id="sbEmail" placeholder="email" value="${esc(db.settings.email||"")}"><input id="sbPass" placeholder="пароль" type="password"><button class="primary" onclick="sbSave()">Сохранить подключение</button><button class="btn" onclick="sbSignup()">Создать аккаунт</button><button class="btn" onclick="sbLogin()">Войти</button><button class="btn" onclick="sbPush()">Отправить в облако</button><button class="btn" onclick="sbPull()">Загрузить из облака</button></div></div><div class="card"><h3>Статус</h3><p>${db.settings.token?"Синхронизация доступна":"Локальный режим"}</p></div></div>`)}
function updateSyncState(){if(!$("syncState"))return;$("syncState").textContent=db.settings.token?"Синхронизация":"Локально";$("syncState").classList.toggle("ok",!!db.settings.token)}
function sbSave(){db.settings.supabaseUrl=val("sbUrl").trim().replace(/\/$/,"");db.settings.anonKey=val("sbKey").trim();db.settings.email=val("sbEmail").trim();save();alert("Сохранено")}
async function sbSignup(){sbSave();const r=await fetch(db.settings.supabaseUrl+"/auth/v1/signup",{method:"POST",headers:sbHeaders(false),body:JSON.stringify({email:db.settings.email,password:val("sbPass")})});alert(r.ok?"Аккаунт создан. Проверь почту, если включено подтверждение.":"Ошибка регистрации")}
async function sbLogin(){sbSave();const r=await fetch(db.settings.supabaseUrl+"/auth/v1/token?grant_type=password",{method:"POST",headers:sbHeaders(false),body:JSON.stringify({email:db.settings.email,password:val("sbPass")})});const j=await r.json();if(j.access_token){db.settings.token=j.access_token;save();alert("Вход выполнен");renderSettings()}else alert("Ошибка входа")}
function sbHeaders(auth=true){const h={apikey:db.settings.anonKey,"Content-Type":"application/json"};if(auth&&db.settings.token)h.Authorization="Bearer "+db.settings.token;return h}
async function sbPush(){if(!db.settings.token)return alert("Сначала войди");const r=await fetch(db.settings.supabaseUrl+"/rest/v1/items",{method:"POST",headers:{...sbHeaders(true),Prefer:"return=minimal"},body:JSON.stringify({type:"workspace",data:db,deleted:false})});alert(r.ok?"Отправлено в облако":"Ошибка отправки")}
async function sbPull(){if(!db.settings.token)return alert("Сначала войди");const r=await fetch(db.settings.supabaseUrl+"/rest/v1/items?type=eq.workspace&deleted=eq.false&select=*&order=updated_at.desc&limit=1",{headers:sbHeaders(true)});const j=await r.json();if(Array.isArray(j)&&j[0]?.data){db=migrate(j[0].data);save();alert("Загружено");setPage("dashboard")}else alert("В облаке пока пусто")}
function render(id){({dashboard:renderDashboard,plan:renderPlan,calendar:renderCalendar,language:renderLanguage,field:renderField,actors:renderActors,map:renderMap,analysis:renderAnalysis,media:renderMedia,portfolio:renderPortfolio,dataExport:renderExport,settings:renderSettings}[id]||renderDashboard)()}
document.addEventListener("pointermove",e=>{document.body.style.setProperty("--mx",Math.round(e.clientX/window.innerWidth*100)+"%");document.body.style.setProperty("--my",Math.round(e.clientY/window.innerHeight*100)+"%")},{passive:true});
initNav();setTheme(db.settings.theme||"dark");updateSyncState();setPage("dashboard");
</script>
</body>
</html>
